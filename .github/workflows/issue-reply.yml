name: Smart Issue Auto Reply

on:
  issues:
    types: [opened]

jobs:
  classify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Analyze issue and classify
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;

            const title = (issue.title || "").toLowerCase();
            const body = (issue.body || "").toLowerCase();
            const text = title + " " + body;

            let repoHint = "";
            try {
              const fs = require("fs");
              repoHint = fs.readFileSync("README.md", "utf8").toLowerCase();
            } catch (e) {}

            const bugKeywords = [
              "error", "crash", "fail", "not working",
              "bug", "exception", "エラー", "落ちる", "動かない"
            ];

            const featureKeywords = [
              "feature", "request", "add", "support", "want", "追加"
            ];

            const specHints = [
              "should", "expected", "designed", "behavior", "仕様"
            ];

            const bugScore = bugKeywords.filter(k => text.includes(k)).length;
            const featureScore = featureKeywords.filter(k => text.includes(k)).length;
            const specScore = specHints.filter(k => repoHint.includes(k)).length;

            let label = "unclear";
            let reply = "内容を確認しました。追加情報があればお願いします。";

            if (bugScore > featureScore && bugScore > specScore) {
              label = "bug";
              reply = "バグ報告として分類しました。確認します。";
            } else if (featureScore > bugScore && featureScore > specScore) {
              label = "feature";
              reply = "機能要望として分類しました。検討対象にします。";
            } else if (specScore > 0) {
              label = "spec-like";
              reply = "仕様に基づく挙動の可能性があります。ドキュメントを確認してください。";
            }

            // ←ここ重要：bodyは必ずJS側で安全に組み立てる
            const commentBody = [
              `🤖 自動分類: **${label}**`,
              "",
              reply
            ].join("\n");

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: [label]
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: commentBody
            });
